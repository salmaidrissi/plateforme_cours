<!DOCTYPE html>
<html>
<head>

    <title>Liste des cours</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container mt-5">

<h1 class="mb-4">Liste des cours</h1>

<a href="{% url 'ajouter_cours' %}"
   class="btn btn-success mb-4">

   Ajouter un cours

</a>

<div class="row">

{% for c in cours %}

<div class="col-md-4">

    <div class="card shadow mb-4">

        <div class="card-body">

            <h3>{{ c.titre }}</h3>

            <p>{{ c.description }}</p>

            <a href="{% url 'detail_cours' c.id %}"
               class="btn btn-info">

               Détails

            </a>

            <a href="{% url 'modifier_cours' c.id %}"
               class="btn btn-warning">

               Modifier

            </a>

            <a href="{% url 'supprimer_cours' c.id %}"
               class="btn btn-danger">

               Supprimer

            </a>

        </div>

    </div>

</div>

{% endfor %}

</div>

</body>
</html>
