<!DOCTYPE html>
<html>
<head>

    <title>Détails cours</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container mt-5">

<div class="card shadow p-4">

    <h1>{{ cours.titre }}</h1>
{% if cours.image %}
    <img src="{{ cours.image.url }}" class="img-fluid mb-3" style="max-height: 400px; object-fit: cover;">
{% endif %}

{% if cours.pdf %}
    <a href="{{ cours.pdf.url }}" class="btn btn-primary" target="_blank">
        Voir le PDF du cours
    </a>
{% endif %}

    <p>{{ cours.description }}</p>

    <p>
        <strong>Enseignant :</strong>
        {{ cours.enseignant }}
    </p>

</div>

</body>
</html>
