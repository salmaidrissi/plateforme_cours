<h2>Connexion</h2>
<form method="POST">
    {% csrf_token %}

    <input type="text" name="username" placeholder="Nom utilisateur"><br><br>

    <input type="password" name="password" placeholder="Mot de passe"><br><br>

    <button type="submit">Se connecter</button>
</form>

<p style="color:red;">
    {{ error }}
</p>
